<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<meta content="noindex,nofollow" name="robots">
<title>Supabase CMS | Golyn Nail</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f6efe5;--panel:#fffaf3;--line:#dcc7a8;--text:#241607;--muted:#7a6044;--gold:#b8852f;--brown:#2e1a08;--danger:#9b2d1f}
body{background:var(--bg);color:var(--text);font-family:Arial,"Helvetica Neue",sans-serif;line-height:1.55;padding:24px}
a{color:var(--brown)}
.shell{max-width:1180px;margin:0 auto}
header{display:flex;justify-content:space-between;gap:18px;align-items:center;margin-bottom:22px}
h1{font-family:Georgia,serif;font-weight:400;font-size:32px}
.status{font-size:13px;color:var(--muted)}
.tabs{display:flex;gap:8px;margin:18px 0}
.tab{border:1px solid var(--line);background:var(--panel);padding:10px 14px;border-radius:6px;cursor:pointer}
.tab.active{background:var(--brown);color:var(--bg);border-color:var(--brown)}
.grid{display:grid;grid-template-columns:360px 1fr;gap:18px;align-items:start}
.panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}
.panel h2{font-size:18px;margin-bottom:14px}
label{display:block;font-size:13px;color:var(--muted);margin:12px 0 5px}
input,select,textarea{width:100%;border:1px solid var(--line);border-radius:6px;background:#fff;padding:10px;font:inherit;color:var(--text)}
textarea{min-height:170px;resize:vertical}
button{border:0;border-radius:6px;background:var(--brown);color:var(--bg);padding:10px 14px;cursor:pointer;font:inherit}
button.secondary{background:#e9d8bf;color:var(--brown)}
button.danger{background:var(--danger)}
button:disabled{opacity:.55;cursor:not-allowed}
.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}
.list{display:grid;gap:10px}
.item{display:grid;grid-template-columns:72px 1fr auto;gap:12px;align-items:center;border:1px solid var(--line);border-radius:8px;padding:10px;background:#fff}
.item img{width:72px;height:54px;object-fit:cover;border-radius:4px;background:#eee}
.item-title{font-weight:700}
.item-meta{font-size:12px;color:var(--muted)}
.hidden{display:none}
.login{max-width:420px;margin:70px auto}
.notice{border:1px solid var(--line);background:#fff;padding:12px;border-radius:6px;color:var(--muted);font-size:13px;margin-bottom:14px}
.checkrow{display:flex;align-items:center;gap:8px;margin-top:12px}
.checkrow input{width:auto}
@media(max-width:860px){body{padding:14px}.grid{grid-template-columns:1fr}header{display:block}.item{grid-template-columns:58px 1fr}.item img{width:58px;height:48px}.item .actions{grid-column:1/-1}}
</style>
</head>
<body>
<main class="shell">
  <section class="login panel" id="loginPanel">
    <h1>Golyn Supabase CMS</h1>
    <p class="notice">Điền Supabase URL và anon key trong <code>assets/js/supabase-config.js</code>, sau đó đăng nhập bằng tài khoản đã được thêm vào bảng <code>cms_admins</code>.</p>
    <label for="email">Email admin</label>
    <input id="email" autocomplete="email" type="email">
    <label for="password">Mật khẩu</label>
    <input id="password" autocomplete="current-password" type="password">
    <div class="actions">
      <button id="loginBtn" type="button">Đăng nhập</button>
    </div>
    <p class="status" id="loginStatus"></p>
  </section>

  <section class="hidden" id="appPanel">
    <header>
      <div>
        <h1>Golyn CMS</h1>
        <p class="status" id="sessionStatus">Đang kiểm tra phiên đăng nhập...</p>
      </div>
      <div class="actions">
        <a href="index.html">Xem website</a>
        <button class="secondary" id="refreshBtn" type="button">Tải lại</button>
        <button class="danger" id="logoutBtn" type="button">Đăng xuất</button>
      </div>
    </header>

    <div class="tabs">
      <button class="tab active" data-tab="articles" type="button">Bài viết</button>
      <button class="tab" data-tab="gallery" type="button">Gallery</button>
    </div>

    <section class="grid" id="articlesTab">
      <form class="panel" id="articleForm">
        <h2 id="articleFormTitle">Thêm bài viết</h2>
        <input id="articleId" type="hidden">
        <label for="articleLang">Ngôn ngữ</label>
        <select id="articleLang">
          <option value="ja">日本語</option>
          <option value="vi">Tiếng Việt</option>
          <option value="en">English</option>
          <option value="zh">中文</option>
          <option value="ko">한국어</option>
          <option value="my">မြန်မာ</option>
          <option value="id">Bahasa Indonesia</option>
        </select>
        <label for="articleTitle">Tiêu đề</label>
        <input id="articleTitle" required>
        <label for="articleSlug">Slug URL</label>
        <input id="articleSlug" placeholder="tu-dong-tao-tu-tieu-de">
        <label for="articleTag">Tag</label>
        <input id="articleTag">
        <label for="articleDesc">Mô tả ngắn</label>
        <textarea id="articleDesc"></textarea>
        <label for="articleContent">Nội dung</label>
        <textarea id="articleContent" required></textarea>
        <label for="articleImageFile">Ảnh đại diện</label>
        <input accept="image/*" id="articleImageFile" type="file">
        <label for="articleImageUrl">Hoặc URL ảnh</label>
        <input id="articleImageUrl">
        <label for="articleStatus">Trạng thái</label>
        <select id="articleStatus">
          <option value="published">Published</option>
          <option value="draft">Draft</option>
        </select>
        <label for="articleDate">Ngày đăng</label>
        <input id="articleDate" type="date">
        <div class="actions">
          <button type="submit">Lưu bài viết</button>
          <button class="secondary" id="newArticleBtn" type="button">Bài mới</button>
          <button class="danger hidden" id="deleteArticleBtn" type="button">Xóa</button>
        </div>
      </form>
      <section class="panel">
        <h2>Danh sách bài viết</h2>
        <div class="list" id="articlesList"></div>
      </section>
    </section>

    <section class="grid hidden" id="galleryTab">
      <form class="panel" id="galleryForm">
        <h2 id="galleryFormTitle">Thêm ảnh</h2>
        <input id="galleryId" type="hidden">
        <label for="galleryFile">Upload ảnh</label>
        <input accept="image/*" id="galleryFile" type="file">
        <label for="gallerySrc">Hoặc URL ảnh</label>
        <input id="gallerySrc" required>
        <label for="galleryLabel">Tên ảnh</label>
        <input id="galleryLabel" required>
        <label for="galleryTag">Tag</label>
        <input id="galleryTag">
        <label for="galleryAlt">Alt text</label>
        <input id="galleryAlt">
        <label for="galleryOrder">Thứ tự</label>
        <input id="galleryOrder" type="number" value="0">
        <label class="checkrow"><input id="galleryFeatured" type="checkbox"> Hiển thị ở trang chủ</label>
        <div class="actions">
          <button type="submit">Lưu ảnh</button>
          <button class="secondary" id="newGalleryBtn" type="button">Ảnh mới</button>
          <button class="danger hidden" id="deleteGalleryBtn" type="button">Xóa</button>
        </div>
      </form>
      <section class="panel">
        <h2>Danh sách gallery</h2>
        <div class="list" id="galleryList"></div>
      </section>
    </section>
  </section>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/supabase-config.js"></script>
<script>
(function(){
  const config=window.GOLYN_SUPABASE||{};
  const status=document.getElementById('loginStatus');
  const loginPanel=document.getElementById('loginPanel');
  const appPanel=document.getElementById('appPanel');
  const bucket=config.mediaBucket||'golyn-media';
  let client=null;
  let articles=[];
  let gallery=[];

  function setStatus(text){status.textContent=text||''}
  function slugify(value){return String(value||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'')||String(Date.now())}
  function today(){return new Date().toISOString().slice(0,10)}
  function escapeHTML(value){return String(value||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
  function requireClient(){if(!client)throw new Error('Chưa cấu hình Supabase')}

  async function uploadFile(file, folder){
    if(!file)return '';
    const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
    const path=folder+'/'+Date.now()+'-'+slugify(file.name.replace(/\.[^.]+$/,''))+'.'+ext;
    const {error}=await client.storage.from(bucket).upload(path,file,{cacheControl:'3600',upsert:false});
    if(error)throw error;
    const {data}=client.storage.from(bucket).getPublicUrl(path);
    return data.publicUrl;
  }

  function initClient(){
    if(!config.url||!config.anonKey||!window.supabase){
      setStatus('Chưa cấu hình Supabase URL / anon key.');
      return false;
    }
    client=window.supabase.createClient(config.url,config.anonKey);
    return true;
  }

  async function checkSession(){
    if(!initClient())return;
    const {data}=await client.auth.getSession();
    if(data.session)showApp(data.session.user.email);
  }

  async function showApp(email){
    loginPanel.classList.add('hidden');
    appPanel.classList.remove('hidden');
    document.getElementById('sessionStatus').textContent='Đã đăng nhập: '+email;
    await loadAll();
  }

  async function loadAll(){
    requireClient();
    const [articleResult,galleryResult]=await Promise.all([
      client.from('articles').select('*').order('published_at',{ascending:false}).order('sort_order',{ascending:true}),
      client.from('gallery_items').select('*').order('sort_order',{ascending:true}).order('created_at',{ascending:false})
    ]);
    if(articleResult.error)throw articleResult.error;
    if(galleryResult.error)throw galleryResult.error;
    articles=articleResult.data||[];
    gallery=galleryResult.data||[];
    renderArticles();
    renderGallery();
  }

  function renderArticles(){
    const list=document.getElementById('articlesList');
    list.innerHTML=articles.map(article=>`
      <div class="item">
        <img alt="" src="${escapeHTML(article.image_url||'')}">
        <div>
          <div class="item-title">${escapeHTML(article.title)}</div>
          <div class="item-meta">${escapeHTML(article.lang)} | ${escapeHTML(article.status)} | ${escapeHTML(article.published_at||'')}</div>
        </div>
        <div class="actions"><button type="button" data-edit-article="${article.id}">Sửa</button></div>
      </div>`).join('')||'<p class="status">Chưa có bài viết.</p>';
  }

  function renderGallery(){
    const list=document.getElementById('galleryList');
    list.innerHTML=gallery.map(item=>`
      <div class="item">
        <img alt="" src="${escapeHTML(item.src)}">
        <div>
          <div class="item-title">${escapeHTML(item.label)}</div>
          <div class="item-meta">${escapeHTML(item.tag||'')} | order ${escapeHTML(item.sort_order||0)}${item.featured?' | featured':''}</div>
        </div>
        <div class="actions"><button type="button" data-edit-gallery="${item.id}">Sửa</button></div>
      </div>`).join('')||'<p class="status">Chưa có ảnh.</p>';
  }

  function resetArticleForm(){
    document.getElementById('articleFormTitle').textContent='Thêm bài viết';
    document.getElementById('articleId').value='';
    document.getElementById('articleLang').value='ja';
    document.getElementById('articleTitle').value='';
    document.getElementById('articleSlug').value='';
    document.getElementById('articleTag').value='';
    document.getElementById('articleDesc').value='';
    document.getElementById('articleContent').value='';
    document.getElementById('articleImageFile').value='';
    document.getElementById('articleImageUrl').value='';
    document.getElementById('articleStatus').value='published';
    document.getElementById('articleDate').value=today();
    document.getElementById('deleteArticleBtn').classList.add('hidden');
  }

  function editArticle(id){
    const article=articles.find(item=>item.id===id);
    if(!article)return;
    document.getElementById('articleFormTitle').textContent='Sửa bài viết';
    document.getElementById('articleId').value=article.id;
    document.getElementById('articleLang').value=article.lang||'ja';
    document.getElementById('articleTitle').value=article.title||'';
    document.getElementById('articleSlug').value=article.slug||'';
    document.getElementById('articleTag').value=article.tag||'';
    document.getElementById('articleDesc').value=article.excerpt||article.desc||'';
    document.getElementById('articleContent').value=article.content||'';
    document.getElementById('articleImageUrl').value=article.image_url||'';
    document.getElementById('articleStatus').value=article.status||'published';
    document.getElementById('articleDate').value=article.published_at||today();
    document.getElementById('deleteArticleBtn').classList.remove('hidden');
  }

  function resetGalleryForm(){
    document.getElementById('galleryFormTitle').textContent='Thêm ảnh';
    document.getElementById('galleryId').value='';
    document.getElementById('galleryFile').value='';
    document.getElementById('gallerySrc').value='';
    document.getElementById('galleryLabel').value='';
    document.getElementById('galleryTag').value='';
    document.getElementById('galleryAlt').value='';
    document.getElementById('galleryOrder').value='0';
    document.getElementById('galleryFeatured').checked=false;
    document.getElementById('deleteGalleryBtn').classList.add('hidden');
  }

  function editGallery(id){
    const item=gallery.find(entry=>entry.id===id);
    if(!item)return;
    document.getElementById('galleryFormTitle').textContent='Sửa ảnh';
    document.getElementById('galleryId').value=item.id;
    document.getElementById('gallerySrc').value=item.src||'';
    document.getElementById('galleryLabel').value=item.label||'';
    document.getElementById('galleryTag').value=item.tag||'';
    document.getElementById('galleryAlt').value=item.alt||'';
    document.getElementById('galleryOrder').value=item.sort_order||0;
    document.getElementById('galleryFeatured').checked=Boolean(item.featured);
    document.getElementById('deleteGalleryBtn').classList.remove('hidden');
  }

  document.getElementById('loginBtn').addEventListener('click',async()=>{
    try{
      if(!initClient())return;
      const email=document.getElementById('email').value.trim();
      const password=document.getElementById('password').value;
      const {data,error}=await client.auth.signInWithPassword({email,password});
      if(error)throw error;
      await showApp(data.user.email);
    }catch(error){setStatus(error.message)}
  });

  document.getElementById('logoutBtn').addEventListener('click',async()=>{await client.auth.signOut();location.reload()});
  document.getElementById('refreshBtn').addEventListener('click',()=>loadAll().catch(error=>alert(error.message)));
  document.getElementById('newArticleBtn').addEventListener('click',resetArticleForm);
  document.getElementById('newGalleryBtn').addEventListener('click',resetGalleryForm);

  document.querySelectorAll('.tab').forEach(tab=>tab.addEventListener('click',()=>{
    document.querySelectorAll('.tab').forEach(item=>item.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('articlesTab').classList.toggle('hidden',tab.dataset.tab!=='articles');
    document.getElementById('galleryTab').classList.toggle('hidden',tab.dataset.tab!=='gallery');
  }));

  document.addEventListener('click',event=>{
    const articleId=event.target.dataset.editArticle;
    const galleryId=event.target.dataset.editGallery;
    if(articleId)editArticle(articleId);
    if(galleryId)editGallery(galleryId);
  });

  document.getElementById('articleTitle').addEventListener('blur',()=>{
    const slug=document.getElementById('articleSlug');
    if(!slug.value)slug.value=slugify(document.getElementById('articleTitle').value);
  });

  document.getElementById('articleForm').addEventListener('submit',async event=>{
    event.preventDefault();
    try{
      const id=document.getElementById('articleId').value;
      const file=document.getElementById('articleImageFile').files[0];
      const uploaded=await uploadFile(file,'articles');
      const payload={
        lang:document.getElementById('articleLang').value,
        title:document.getElementById('articleTitle').value.trim(),
        slug:slugify(document.getElementById('articleSlug').value||document.getElementById('articleTitle').value),
        tag:document.getElementById('articleTag').value.trim(),
        excerpt:document.getElementById('articleDesc').value.trim(),
        content:document.getElementById('articleContent').value.trim(),
        image_url:uploaded||document.getElementById('articleImageUrl').value.trim()||null,
        status:document.getElementById('articleStatus').value,
        published_at:document.getElementById('articleDate').value||today()
      };
      const result=id
        ? await client.from('articles').update(payload).eq('id',id)
        : await client.from('articles').insert(payload);
      if(result.error)throw result.error;
      resetArticleForm();
      await loadAll();
    }catch(error){alert(error.message)}
  });

  document.getElementById('galleryForm').addEventListener('submit',async event=>{
    event.preventDefault();
    try{
      const id=document.getElementById('galleryId').value;
      const file=document.getElementById('galleryFile').files[0];
      const uploaded=await uploadFile(file,'gallery');
      const payload={
        src:uploaded||document.getElementById('gallerySrc').value.trim(),
        label:document.getElementById('galleryLabel').value.trim(),
        tag:document.getElementById('galleryTag').value.trim(),
        alt:document.getElementById('galleryAlt').value.trim(),
        sort_order:Number(document.getElementById('galleryOrder').value||0),
        featured:document.getElementById('galleryFeatured').checked
      };
      const result=id
        ? await client.from('gallery_items').update(payload).eq('id',id)
        : await client.from('gallery_items').insert(payload);
      if(result.error)throw result.error;
      resetGalleryForm();
      await loadAll();
    }catch(error){alert(error.message)}
  });

  document.getElementById('deleteArticleBtn').addEventListener('click',async()=>{
    const id=document.getElementById('articleId').value;
    if(!id||!confirm('Xóa bài viết này?'))return;
    const {error}=await client.from('articles').delete().eq('id',id);
    if(error)alert(error.message);else{resetArticleForm();await loadAll()}
  });

  document.getElementById('deleteGalleryBtn').addEventListener('click',async()=>{
    const id=document.getElementById('galleryId').value;
    if(!id||!confirm('Xóa ảnh này khỏi gallery?'))return;
    const {error}=await client.from('gallery_items').delete().eq('id',id);
    if(error)alert(error.message);else{resetGalleryForm();await loadAll()}
  });

  resetArticleForm();
  resetGalleryForm();
  checkSession();
})();
</script>
</body>
</html>
